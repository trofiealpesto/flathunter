name: flathunter

x-app-env: &app-env
  env_file:
    - ${FLATHUNTER_PROD_ENV_FILE:-.env}
  environment:
    APP_ORIGIN: ${APP_ORIGIN}
    NODE_ENV: production

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flathunter} -d ${POSTGRES_DB:-flathunter}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    <<: *app-env
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    command: ["pnpm", "db:migrate"]
    restart: "no"

  api:
    <<: *app-env
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "4000"
    restart: unless-stopped

  worker:
    <<: *app-env
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    command: ["node", "apps/worker/dist/dev.js"]
    restart: unless-stopped

  web-http:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    profiles:
      - http
    depends_on:
      api:
        condition: service_started
    environment:
      CADDY_SITE_ADDRESS: http://:80
    ports:
      - "${WEB_PORT:-80}:80"
    restart: unless-stopped

  web-https:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    profiles:
      - https
    depends_on:
      api:
        condition: service_started
    environment:
      CADDY_SITE_ADDRESS: ${APP_ORIGIN}
    ports:
      - "${WEB_PORT:-443}:${WEB_PORT:-443}"
      - "${HTTP_CHALLENGE_PORT:-80}:80"
    restart: unless-stopped

volumes:
  postgres-data:
